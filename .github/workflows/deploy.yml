name: deploy
on:
  push: { branches: [main] }
  workflow_dispatch: {}
permissions: { contents: read, pages: write, id-token: write }
concurrency: { group: pages, cancel-in-progress: true }
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with: { node-version: 24, cache: npm }
      # npm install (not ci): Vite/rolldown ships platform-specific native
      # bindings as optionalDependencies, and a macOS-generated lockfile omits
      # the Linux ones, which `npm ci` rejects. install reconciles per-platform.
      - run: npm install --no-audit --no-fund
      - run: npm run test
      - run: npm run check
      - run: BASE_PATH=/homestead npm run build
      - uses: actions/upload-pages-artifact@v5
        with: { path: build }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: { name: github-pages, url: "${{ steps.deployment.outputs.page_url }}" }
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
