<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<!-- Fonts are bundled by Vite from src/lib/assets/fonts and referenced with
		     hashed, base-prefixed names in the built CSS, so they can't be preloaded
		     by a static path here. font-display: swap keeps first paint unblocked. -->
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
